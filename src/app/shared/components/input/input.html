@if (label()) {
  <label [for]="label()">{{ label() }}</label>
}
<div>
  @if (mask()) {
    <input
      #input
      [type]="inputType() ?? 'text'"
      [placeholder]="placeholder() ?? ''"
      [disabled]="disabled()"
      [maxlength]="maxlength()"
      [(ngModel)]="value"
      (ngModelChange)="writeValue(value)"
      [mask]="mask()"
      [suffix]="suffix()"
      [prefix]="prefix()"
      [thousandSeparator]="thousandSeparator()"
      [decimalMarker]="decimalMarker()"
      [clearIfNotMatch]="clearIfNotMatch()"
      [showMaskTyped]="showMaskTyped()"
      [placeHolderCharacter]="placeHolderCharacter()"
      [shownMaskExpression]="shownMaskExpression()"
      [specialCharacters]="specialCharacters()!"
      [dropSpecialCharacters]="dropSpecialCharacters()"
      [hiddenInput]="hiddenInput()"
      [validation]="validation()"
      [instantPrefix]="instantPrefix()"
      [separatorLimit]="separatorLimit()"
      [apm]="apm()"
      [allowNegativeNumbers]="allowNegativeNumbers()"
      [leadZeroDateTime]="leadZeroDateTime()"
      [triggerOnMaskChange]="triggerOnMaskChange()"
      [keepCharacterPositions]="keepCharacterPositions()"
      [patterns]="patterns()!"
    />
  } @else {
    <input
      #input
      [type]="inputType() ?? 'text'"
      [placeholder]="placeholder() ?? ''"
      [disabled]="disabled()"
      [maxlength]="maxlength()"
      [(ngModel)]="value"
      (ngModelChange)="writeValue(value)"
    />
  }
  @if (type() === 'password') {
    <span (click)="handleTogglePassword()" class="material-symbols-outlined password-icon">
      {{ passwordIcon() }}
    </span>
  }
</div>
