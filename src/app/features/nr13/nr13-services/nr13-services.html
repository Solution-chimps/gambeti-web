<section class="section" id="servicos">
  <div class="container">
    <div class="section-header">
      <div class="overline">Serviços NR-13</div>
      <h2>Inspeções, Laudos e <strong>Serviços Especializados</strong></h2>
      <p>
        Selecione o equipamento para conhecer os serviços que oferecemos em cada categoria da NR-13
      </p>
    </div>

    <gb-tabs [tabs]="tabs()" class="tabs-container">
      <div class="tabs-nav">
        <button class="tab-btn active" data-tab="caldeiras">
          <i class="fas fa-fire"></i> Caldeiras
        </button>
        <button class="tab-btn" data-tab="vasos">
          <i class="fas fa-circle-dot"></i> Vasos de Pressão
        </button>
        <button class="tab-btn" data-tab="tubulacoes">
          <i class="fas fa-grip-lines"></i> Tubulações
        </button>
        <button class="tab-btn" data-tab="tanques">
          <i class="fas fa-database"></i> Tanques Metálicos
        </button>
      </div>
    </gb-tabs>
  </div>
</section>
