<section class="section faq" id="faq">
  <div class="container">
    <div class="section-header">
      <div class="overline">Dúvidas sobre NR-13</div>
      <h2>Perguntas Frequentes</h2>
    </div>
    <div class="faq-list">
      @for (item of faqs(); track item.type) {
        <div class="faq-item" [attr.data-id]="item.type">
          <button class="faq-question" dropdown>
            <span>{{ item.question }}</span>
            <i class="fas fa-chevron-down"></i>
          </button>
          <div class="faq-answer">
            {{ item.answer }}
          </div>
        </div>
      }
    </div>
  </div>
</section>
