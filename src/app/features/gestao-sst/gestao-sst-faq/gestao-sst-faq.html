<section class="section faq" id="faq">
  <div class="container">
    <div class="section-header">
      <div class="overline">Perguntas Frequentes</div>
      <h2>Dúvidas sobre <em>Gestão SST</em></h2>
      <p>
        Respostas técnicas sobre PGR, LTCAT, Laudos NR-15/NR-16 (atualizada 2025), PCMSO, eSocial e
        toda a documentação de SST
      </p>
    </div>
    <div class="faq-list">
      @for (item of faqs(); track item.type) {
        <div class="faq-item" [attr.data-id]="item.type">
          <button class="faq-question" dropdown>
            <span>{{ item.question }}</span>
            <i class="fas fa-chevron-down"></i>
          </button>
          <div class="faq-answer">
            {{ item.answer }}
          </div>
        </div>
      }
    </div>
  </div>
</section>
